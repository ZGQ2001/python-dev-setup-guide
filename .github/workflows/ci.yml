# .github/workflows/ci.yml
name: CI 流水线

# 触发条件：推送到 main 或提交 PR 时，自动检查项目和文档是否还完整。
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-gate:
    name: 代码质检 / Ubuntu
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: 还原依赖
        run: uv sync --dev

      - name: 检查格式和代码规范
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: 运行单元测试
        run: uv run pytest

  document-build:
    name: 文档构建 / Pandoc
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: 准备构建目录
        run: mkdir -p build

      - name: 导出单文件 HTML
        # 只生成 HTML，不在 CI 里强行转 PDF/Word，避免字体和模板环境污染结果。
        # -f gfm 强制按 GitHub Markdown 解析，避免章节里示例性的 --- 被误判为 YAML 元数据。
        run: |
          pandoc -f gfm README.md docs/index.md docs/*.md \
            --standalone \
            --metadata title="非程序员的工程化 Python 入门操作手册" \
            --output build/python-dev-setup-guide.html

      - name: 上传文档产物
        uses: actions/upload-artifact@v4
        with:
          name: python-dev-setup-guide-html
          path: build/python-dev-setup-guide.html
